<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #333; margin: 0; padding: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: flex-end; }
  .arch-wrap {
    position: relative;
    width: 140vw;
    height: 70vw;
    bottom: 0;
    transform: scale(1);
    transform-origin: 50% 100%;
  }
  .arch-overflow {
    position: absolute;
    inset: 0;
    overflow: hidden;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }
  .arch-img {
    position: absolute;
    inset: 0;
    background: url('https://picsum.photos/1200/800') center bottom/cover;
  }
  .arch-frame {
    position: absolute;
    inset: 0;
    border-top: 20.3vw solid white;
    border-left: 20.3vw solid white;
    border-right: 20.3vw solid white;
    border-bottom: none;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="arch-wrap">
    <div class="arch-overflow">
      <div class="arch-img"></div>
      <div class="arch-frame"></div>
    </div>
  </div>
</body>
</html>
